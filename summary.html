<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SSS Form Summary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .summary-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Form Cards */
        .form-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,60,143,0.15);
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }

        .card-header {
            background: linear-gradient(135deg, #003c8f, #1a4fa2);
            color: white;
            padding: 15px 20px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 3px solid #ffd700;
            letter-spacing: 0.5px;
        }

        .card-body {
            padding: 20px;
        }

        /* Header with Logo - RIGHT SIDE LANG */
        .header-with-logo {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
            flex-wrap: wrap;
        }

        .header-text {
            flex: 1;
        }

        .header-text h1 {
            font-size: 1.5rem;
            color: #003c8f;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .header-text .branch {
            color: #1976d2;
            font-size: 1rem;
            font-weight: 600;
        }

        .header-text .address {
            color: #666;
            font-size: 0.85rem;
        }

        .logo-right {
            width: 70px;
            height: 70px;
            background: #003c8f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            margin-left: 15px;
        }

        .logo-right img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Republic Header - may logo sa kanan din */
        .republic-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .republic-text {
            flex: 1;
        }

        .republic-text h2 {
            font-size: 1.5rem;
            color: #003c8f;
            text-transform: uppercase;
            font-weight: 800;
        }

        .republic-text h3 {
            font-size: 1.3rem;
            color: #1976d2;
            margin: 5px 0;
            text-transform: uppercase;
        }

        .republic-text .form-number {
            color: #666;
            font-size: 0.85rem;
            font-style: italic;
        }

        /* Info Tables - Mobile Optimized */
        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            border-radius: 8px;
            overflow: hidden;
            font-size: 0.95rem;
        }

        .info-table td {
            padding: 10px;
            border: 1px solid #e0e0e0;
        }

        .info-table td:first-child {
            font-weight: 600;
            color: #003c8f;
            width: 140px;
            background: #f8f9ff;
        }

        /* Mobile: Stack table cells */
        @media (max-width: 600px) {
            .info-table td {
                display: block;
                width: 100%;
            }
            
            .info-table td:first-child {
                width: 100%;
                background: #e8f0fe;
            }
            
            .info-table tr {
                display: block;
                margin-bottom: 10px;
                border: 1px solid #e0e0e0;
                border-radius: 8px;
            }
            
            .header-with-logo, .republic-header {
                flex-direction: column;
                text-align: center;
            }
            
            .logo-right {
                margin-left: 0;
                margin-top: 10px;
            }
        }

        /* Officials Table - Horizontal Scroll on Mobile */
        .officials-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.9rem;
        }

        .officials-table th {
            background: #003c8f;
            color: white;
            padding: 10px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .officials-table td {
            border: 1px solid #e0e0e0;
            padding: 8px;
            text-align: center;
            vertical-align: middle;
        }

        /* Mobile: Allow horizontal scroll for officials table */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 15px 0;
        }

        /* Signature Grid - Mobile Optimized */
        .signature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            .signature-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }

        .signature-box {
            text-align: center;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }

        .signature-box h4 {
            color: #003c8f;
            margin-bottom: 10px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .signature-img {
            max-width: 100%;
            max-height: 60px;
            margin: 10px 0;
            border: 1px dashed #003c8f;
            padding: 5px;
            background: white;
            border-radius: 4px;
        }

        .signature-name {
            color: #003c8f;
            font-weight: 600;
            padding: 5px;
            background: white;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .official-signature-img {
            max-width: 80px;
            max-height: 35px;
        }

        /* Photo */
        .photo-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .photo-frame {
            width: 100px;
            height: 100px;
            border: 3px solid #003c8f;
            border-radius: 8px;
            overflow: hidden;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Noted Section */
        .noted-section {
            margin-top: 20px;
            text-align: center;
            padding: 15px;
            background: #f0f7ff;
            border-radius: 8px;
        }

        .noted-line {
            width: 200px;
            height: 2px;
            background: #003c8f;
            margin: 10px auto;
        }

        .noted-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #003c8f;
        }

        .noted-title {
            color: #666;
            font-size: 0.9rem;
            font-style: italic;
        }

        /* Granting Section */
        .granting-section {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
        }

        .granting-title {
            color: #003c8f;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* Verified Badge */
        .verified-badge {
            text-align: center;
            margin-bottom: 15px;
        }

        .verified-badge span {
            background: #4caf50;
            color: white;
            padding: 5px 20px;
            border-radius: 50px;
            display: inline-block;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Timestamp */
        .timestamp {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            margin: 15px 0;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        /* Print Button */
        .print-btn {
            background: linear-gradient(135deg, #003c8f, #1976d2);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            margin: 15px auto;
            display: block;
            transition: all 0.3s ease;
        }

        .print-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(25, 118, 210, 0.3);
        }

        /* Loading & Error */
        .loading, .error-message {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
        }

        .loading {
            color: #1976d2;
        }

        .error-message {
            color: #f44336;
        }

        /* ===== PRINT STYLES ===== */
        @media print {
            @page {
                size: landscape;
                margin: 0.5in;
            }

            body {
                background: white;
                padding: 0;
            }

            .print-btn, .verified-badge, .timestamp {
                display: none !important;
            }

            .summary-container {
                max-width: 100%;
                padding: 0;
                gap: 0;
            }

            .form-card {
                box-shadow: none;
                border: 1px solid #000;
                page-break-after: always;
                page-break-inside: avoid;
                margin: 0;
                border-radius: 0;
            }

            .form-card:last-child {
                page-break-after: auto;
            }

            .card-header {
                background: #003c8f !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .info-table td:first-child {
                background: #f0f0f0 !important;
            }

            .noted-section {
                background: #f0f7ff !important;
                border: 1px solid #003c8f !important;
            }

            .officials-table th {
                background: #003c8f !important;
                color: white !important;
            }

            .signature-box {
                border: 1px solid #000;
                background: white;
            }

            .photo-frame {
                border: 2px solid #000;
            }

            .info-table td {
                border: 1px solid #000;
            }
            
            .logo-right {
                border: 1px solid #000;
            }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="summary-container" id="summaryContainer">
        <div class="loading">Loading data from cloud...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfQTN7UTRcW9lBm-rhRqyAOcT5gFZDJIs",
            authDomain: "sss-qr-system-39b59.firebaseapp.com",
            projectId: "sss-qr-system-39b59",
            storageBucket: "sss-qr-system-39b59.firebasestorage.app",
            messagingSenderId: "81090026028",
            appId: "1:81090026028:web:91dfd833462e2d95434f89"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.onload = function() {
            displaySummary();
        };

        async function displaySummary() {
            const container = document.getElementById('summaryContainer');
            
            const urlParams = new URLSearchParams(window.location.search);
            const submissionId = urlParams.get('id');
            
            if (!submissionId) {
                container.innerHTML = '<div class="error-message">❌ No submission ID found</div>';
                return;
            }

            try {
                const docRef = db.collection('sss-submissions').doc(submissionId);
                const docSnap = await docRef.get();

                if (!docSnap.exists) {
                    container.innerHTML = '<div class="error-message">❌ Submission not found in cloud</div>';
                    return;
                }

                const formData = docSnap.data();
                
                let html = '';
                
                // Verified Badge
                html += '<div class="verified-badge">';
                html += '<span>✓ VERIFIED CLOUD DATA</span>';
                html += '</div>';
                
                // ============ FIRST FORM ============
                html += '<div class="form-card">';
                html += '<div class="card-header">📋 COMPANY REPRESENTATIVE AUTHORIZATION CARD</div>';
                html += '<div class="card-body">';
                
                // Header with Logo - RIGHT SIDE LANG
                html += '<div class="header-with-logo">';
                html += '<div class="header-text">';
                html += '<h1>Social Security System</h1>';
                html += '<div class="branch">EASTWOOD BRANCH</div>';
                html += '<div class="address">187 ABQ Building, E. Rodriguez Jr. Ave., Bagumbayan, QC</div>';
                html += '</div>';
                html += '</div>';
                html += '</div>';
                
                const first = formData.firstForm || {};
                
                // Photo
                if (first.photo && first.photo !== '#' && first.photo !== '') {
                    html += '<div class="photo-container">';
                    html += '<div class="photo-frame">';
                    html += `<img src="${first.photo}" alt="1x1 Photo">`;
                    html += '</div>';
                    html += '</div>';
                }
                
                // Company Info
                html += '<table class="info-table">';
                html += '<tr><td>EMPLOYER NAME:</td><td>' + (first.employerName || 'N/A') + '</td></tr>';
                html += '<tr><td>EMPLOYER ID NO.:</td><td>' + (first.employerId || 'N/A') + '</td></tr>';
                html += '<tr><td>ADDRESS:</td><td>' + (first.address || 'N/A') + '</td></tr>';
                html += '<tr><td>TELEPHONE NO.:</td><td>' + (first.telephone || 'N/A') + '</td></tr>';
                html += '<tr><td>CERTIFIED NAME:</td><td>' + (first.certName || 'N/A') + '</td></tr>';
                html += '<tr><td>SS NUMBER:</td><td>' + (first.ssNumber || 'N/A') + '</td></tr>';
                html += '</table>';
                
                // Signatures
                html += '<div class="signature-grid">';
                
                if (first.specimenSignature1 && first.specimenSignature1.length > 50) {
                    html += '<div class="signature-box">';
                    html += '<h4>SPECIMEN SIGNATURE</h4>';
                    html += `<img src="${first.specimenSignature1}" class="signature-img">`;
                    html += '<div class="signature-name">' + (first.specimenName1 || '') + '</div>';
                    html += '</div>';
                }
                
                if (first.employerSignature && first.employerSignature.length > 50) {
                    html += '<div class="signature-box">';
                    html += '<h4>SIGNATURE OVER PRINTED NAME</h4>';
                    html += `<img src="${first.employerSignature}" class="signature-img">`;
                    html += '<div class="signature-name">' + (first.employerName2 || first.employerName || '') + '</div>';
                    html += '</div>';
                }
                
                html += '</div>';
                
                // Noted By
                html += '<div class="noted-section">';
                html += '<div class="noted-line"></div>';
                html += '<div class="noted-name">ELEANOR F. DEATO</div>';
                html += '<div class="noted-title">Branch Head</div>';
                html += '</div>';
                
                html += '</div></div>'; // Close first form
                
                // ============ SECOND FORM ============
                html += '<div class="form-card">';
                html += '<div class="card-header">📋 SPECIMEN SIGNATURE CARD</div>';
                html += '<div class="card-body">';
                
                // Republic Header with Logo - RIGHT SIDE LANG
                html += '<div class="republic-header">';
                html += '<div class="republic-text">';
                html += '<h2>Republic of the Philippines</h2>';
                html += '<h3>SOCIAL SECURITY SYSTEM</h3>';
                html += '<div class="form-number">SSS Form L - 501 (07-94)</div>';
                html += '</div>';
                html += '<div class="logo-right">';
                html += '<img src="republic-of-the-philippines-social-security-system-logo-png_seeklogo.png" alt="SSS Logo" onerror="this.innerHTML=\'SSS\';">';
                html += '</div>';
                html += '</div>';
                
                const second = formData.secondForm || {};
                
                // Company Info
                html += '<table class="info-table">';
                html += '<tr><td>Registered Employer Name:</td><td>' + (second.registeredName || first.employerName || 'N/A') + '</td></tr>';
                html += '<tr><td>I.D. No.:</td><td>' + (second.idNumber || first.employerId || 'N/A') + '</td></tr>';
                html += '<tr><td>Address:</td><td>' + (second.companyAddress || first.address || 'N/A') + '</td></tr>';
                html += '<tr><td>Tel. No.:</td><td>' + (second.telNumber || first.telephone || 'N/A') + '</td></tr>';
                html += '</table>';
                
                // Officials - with horizontal scroll on mobile
                if (second.officials && second.officials.length > 0) {
                    html += '<h3 style="color: #003c8f; margin: 20px 0 10px;">Authorized Officials</h3>';
                    html += '<div class="table-wrapper">';
                    html += '<table class="officials-table">';
                    html += '<thead><tr><th>Name</th><th>Designation</th><th>Initials</th><th>Signature</th></tr></thead>';
                    html += '<tbody>';
                    
                    second.officials.forEach(official => {
                        html += '<tr>';
                        html += '<td>' + (official.name || '') + '</td>';
                        html += '<td>' + (official.designation || '') + '</td>';
                        html += '<td>' + (official.initial || '') + '</td>';
                        html += '<td>';
                        if (official.signature && official.signature.length > 50) {
                            html += `<img src="${official.signature}" class="official-signature-img">`;
                        } else {
                            html += 'No signature';
                        }
                        html += '</td>';
                        html += '</tr>';
                    });
                    
                    html += '</tbody></table>';
                    html += '</div>';
                }
                
                // Granting Authority
                const granting = second.grantingAuthority || {};
                if (granting.name || granting.signature) {
                    html += '<div class="granting-section">';
                    html += '<div class="granting-title">GRANTING AUTHORITY</div>';
                    html += '<p><strong>' + (granting.name || 'N/A') + '</strong></p>';
                    if (granting.signature && granting.signature.length > 50) {
                        html += `<img src="${granting.signature}" class="signature-img">`;
                    }
                    if (granting.date) {
                        html += '<p style="margin-top: 10px;"><strong>Date:</strong> ' + granting.date + '</p>';
                    }
                    html += '</div>';
                }
                
                html += '</div></div>'; // Close second form
                
                // Timestamp
                if (formData.timestamp) {
                    html += '<div class="timestamp">';
                    html += '📅 Generated: ' + new Date(formData.timestamp).toLocaleString();
                    html += '</div>';
                }
                
                html += '<button class="print-btn" onclick="window.print()">🖨️ PRINT BOTH FORMS</button>';
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div class="error-message">❌ Error: ' + error.message + '</div>';
            }
        }
    </script>
</body>
</html>
