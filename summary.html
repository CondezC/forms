<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SSS Summary</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        .summary-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .summary-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,60,143,0.2);
            overflow: hidden;
            border: 1px solid #cfe3ff;
            margin-bottom: 20px;
        }
        
        .card-header {
            background: linear-gradient(135deg, #003c8f, #1976d2);
            color: white;
            padding: 15px 25px;
            font-size: 1.3rem;
            font-weight: 600;
            border-bottom: 3px solid #ffd700;
        }
        
        .card-body {
            padding: 30px;
        }
        
        .summary-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 15px;
        }
        
        .summary-logo {
            width: 80px;
            height: 80px;
            background: #003c8f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .summary-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .summary-title h1 {
            font-size: 2rem;
            color: #003c8f;
        }
        
        .signature-img {
            max-width: 200px;
            max-height: 60px;
            border: 1px dashed #003c8f;
            padding: 5px;
        }
        
        .official-signature-img {
            max-width: 100px;
            max-height: 40px;
        }
        
        .print-btn {
            background: linear-gradient(135deg, #003c8f, #1976d2);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 30px auto 0;
            display: block;
        }
        
        @media print {
            .print-btn, .theme-toggle, .back-btn {
                display: none !important;
            }
            
            .summary-card {
                box-shadow: none !important;
                border: 1px solid #ddd !important;
                page-break-inside: avoid !important;
            }
            
            .card-header {
                background: #003c8f !important;
                color: white !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
        
        @media (max-width: 768px) {
            .summary-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="summary-container" id="summaryContainer">
        <div class="loading">Loading official data from cloud...</div>
    </div>

    <div style="text-align: center; margin: 30px 0;">
        <button class="primary-btn" onclick="window.print()" style="background: #003c8f; padding: 15px 40px;">
            🖨️ PRINT BOTH FORMS
        </button>
    </div>

    <script src="summary.js"></script>
</body>
</html>
