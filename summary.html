<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSS Official Summary</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }

        .summary-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .summary-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,60,143,0.2);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #003c8f, #1976d2);
            color: white;
            padding: 15px 25px;
            font-size: 1.3rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .card-body {
            padding: 30px;
        }

        .header-with-logo {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 15px;
        }

        .logo-placeholder {
            width: 80px;
            height: 80px;
            background: #003c8f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
        }

        .agency-name h1 {
            font-size: 2rem;
            color: #003c8f;
        }

        .republic-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .republic-header h1 {
            font-size: 1.8rem;
            color: #003c8f;
        }

        .republic-header h2 {
            font-size: 1.5rem;
            color: #1976d2;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .info-table td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        .info-table td:first-child {
            font-weight: 600;
            color: #003c8f;
            width: 250px;
            background: #f5f5f5;
        }

        .signature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 30px 0;
        }

        .signature-card {
            text-align: center;
            background: #fafafa;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }

        .signature-display {
            border: 2px dashed #1976d2;
            border-radius: 8px;
            padding: 15px;
            background: white;
            margin-bottom: 15px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signature-display img {
            max-width: 100%;
            max-height: 80px;
        }

        .signature-name-display {
            font-size: 1.1rem;
            padding: 10px;
            background: #e8f0fe;
            border-radius: 5px;
        }

        .employer-signature-section {
            text-align: center;
            margin: 30px 0;
            background: #fafafa;
            padding: 25px;
            border-radius: 10px;
        }

        .employer-signature-display {
            border: 2px dashed #1976d2;
            border-radius: 8px;
            padding: 20px;
            background: white;
            margin: 15px 0;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .employer-signature-display img {
            max-width: 100%;
            max-height: 100px;
        }

        .employer-name-display {
            font-size: 1.2rem;
            font-weight: 600;
            padding: 12px;
            background: #e8f0fe;
            border-radius: 5px;
        }

        .officials-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .officials-table th {
            background: #003c8f;
            color: white;
            padding: 12px;
        }

        .officials-table td {
            border: 1px solid #ddd;
            padding: 15px;
            vertical-align: middle;
        }

        .official-signature-img {
            max-width: 120px;
            max-height: 50px;
        }

        .granting-section {
            margin: 30px 0;
            padding: 25px;
            background: #f0f7ff;
            border-radius: 10px;
        }

        .granting-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #003c8f;
            margin-bottom: 15px;
        }

        .granting-signature-display {
            border: 2px dashed #1976d2;
            border-radius: 8px;
            padding: 20px;
            background: white;
            margin: 15px 0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .granting-signature-display img {
            max-width: 100%;
            max-height: 80px;
        }

        .date-display {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            border: 1px solid #003c8f;
            border-radius: 5px;
        }

        .noted-section {
            text-align: center;
            padding: 25px;
            background: #f0f7ff;
            border-radius: 10px;
            margin-top: 30px;
        }

        .noted-line {
            width: 300px;
            height: 2px;
            background: #003c8f;
            margin: 15px auto;
        }

        .noted-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #003c8f;
        }

        .loading, .error-message {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
        }

        .loading { color: #1976d2; }
        .error-message { color: #f44336; }

        .verified-badge {
            background: #4caf50;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 10px;
        }

        @media print {
            body { background: white; }
        }
    </style>
</head>
<body>
    <div class="summary-container" id="summaryContainer">
        <div class="loading">Loading official data from cloud...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfQTN7UTRcW9lBm-rhRqyAOcT5gFZDJIs",
            authDomain: "sss-qr-system-39b59.firebaseapp.com",
            projectId: "sss-qr-system-39b59",
            storageBucket: "sss-qr-system-39b59.firebasestorage.app",
            messagingSenderId: "81090026028",
            appId: "1:81090026028:web:91dfd833462e2d95434f89"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.onload = function() {
            displaySummary();
        };

        async function displaySummary() {
            const container = document.getElementById('summaryContainer');
            
            const urlParams = new URLSearchParams(window.location.search);
            const submissionId = urlParams.get('id');
            
            if (!submissionId) {
                container.innerHTML = '<div class="error-message">❌ No submission ID found</div>';
                return;
            }

            try {
                const docRef = db.collection('sss-submissions').doc(submissionId);
                const docSnap = await docRef.get();

                if (!docSnap.exists()) {
                    container.innerHTML = '<div class="error-message">❌ Submission not found in cloud</div>';
                    return;
                }

                const formData = docSnap.data();
                
                let html = '';
                
                html += '<div style="text-align: center; margin-bottom: 20px;">';
                html += '<span class="verified-badge">✓ VERIFIED CLOUD DATA</span>';
                html += '</div>';
                
                html += '<div class="summary-card">';
                html += '<div class="card-header">📋 COMPANY REPRESENTATIVE AUTHORIZATION CARD</div>';
                html += '<div class="card-body">';
                
                html += '<div class="header-with-logo">';
                html += '<div class="logo-placeholder">SSS</div>';
                html += '<div class="agency-name">';
                html += '<h1>Social Security System</h1>';
                html += '<div>EASTWOOD BRANCH</div>';
                html += '<div>187 ABQ Building, E. Rodriguez Jr. Ave., Bagumbayan, QC</div>';
                html += '</div>';
                html += '</div>';
                
                const first = formData.firstForm || {};
                
                if (first.photo && first.photo !== '#') {
                    html += '<div style="text-align: right; margin-bottom: 20px;">';
                    html += '<div style="width: 120px; height: 120px; border: 2px solid #003c8f; border-radius: 8px; overflow: hidden; margin-left: auto;">';
                    html += `<img src="${first.photo}" style="width: 100%; height: 100%; object-fit: cover;">`;
                    html += '</div>';
                    html += '</div>';
                }
                
                html += '<table class="info-table">';
                html += '<tr><td>EMPLOYER NAME:</td><td>' + (first.employerName || 'N/A') + '</td></tr>';
                html += '<tr><td>EMPLOYER ID NO.:</td><td>' + (first.employerId || 'N/A') + '</td></tr>';
                html += '<tr><td>ADDRESS:</td><td>' + (first.address || 'N/A') + '</td></tr>';
                html += '<tr><td>TELEPHONE NO.:</td><td>' + (first.telephone || 'N/A') + '</td></tr>';
                html += '</table>';
                
                html += '<div style="background: #f8f9ff; padding: 20px; border-left: 4px solid #1976d2;">';
                html += '<p>Certified: <strong>' + (first.certName || 'N/A') + '</strong> (SS #' + (first.ssNumber || 'N/A') + ')</p>';
                html += '</div>';
                
                html += '<div class="signature-grid">';
                
                html += '<div class="signature-card">';
                html += '<div class="signature-title">SPECIMEN 1</div>';
                html += '<div class="signature-display">';
                if (first.specimenSignature1) {
                    html += `<img src="${first.specimenSignature1}">`;
                } else { html += 'No signature'; }
                html += '</div>';
                html += '<div class="signature-name-display">' + (first.specimenName1 || 'N/A') + '</div>';
                html += '</div>';
                
                html += '<div class="signature-card">';
                html += '<div class="signature-title">SPECIMEN 2</div>';
                html += '<div class="signature-display">';
                if (first.specimenSignature2) {
                    html += `<img src="${first.specimenSignature2}">`;
                } else { html += 'No signature'; }
                html += '</div>';
                html += '<div class="signature-name-display">' + (first.specimenName2 || 'N/A') + '</div>';
                html += '</div>';
                
                html += '</div>';
                
                html += '<div class="employer-signature-section">';
                html += '<div class="signature-title">EMPLOYER/OWNER</div>';
                html += '<div class="employer-signature-display">';
                if (first.employerSignature) {
                    html += `<img src="${first.employerSignature}">`;
                } else { html += 'No signature'; }
                html += '</div>';
                html += '<div class="employer-name-display">' + (first.employerName2 || first.employerName || 'N/A') + '</div>';
                html += '</div>';
                
                html += '<div class="noted-section">';
                html += '<div class="noted-line"></div>';
                html += '<div class="noted-name">ELEANOR F. DEATO</div>';
                html += '<div>Branch Head</div>';
                html += '</div>';
                
                html += '</div></div>'; 
                
                html += '<div class="summary-card">';
                html += '<div class="card-header">📋 SPECIMEN SIGNATURE CARD</div>';
                html += '<div class="card-body">';
                
                html += '<div class="republic-header">';
                html += '<h1>Republic of the Philippines</h1>';
                html += '<h2>SOCIAL SECURITY SYSTEM</h2>';
                html += '<div>SSS Form L - 501 (07-94)</div>';
                html += '</div>';
                
                const second = formData.secondForm || {};
                
                html += '<table class="info-table">';
                html += '<tr><td>Registered Employer:</td><td>' + (second.registeredName || first.employerName || 'N/A') + '</td></tr>';
                html += '<tr><td>I.D. No.:</td><td>' + (second.idNumber || first.employerId || 'N/A') + '</td></tr>';
                html += '<tr><td>Address:</td><td>' + (second.companyAddress || first.address || 'N/A') + '</td></tr>';
                html += '<tr><td>Tel. No.:</td><td>' + (second.telNumber || first.telephone || 'N/A') + '</td></tr>';
                html += '</table>';
                
                if (second.officials && second.officials.length > 0) {
                    html += '<table class="officials-table">';
                    html += '<tr><th>Name</th><th>Designation</th><th>Initials</th><th>Signature</th></tr>';
                    
                    second.officials.forEach(official => {
                        html += '<tr>';
                        html += '<td>' + (official.name || 'N/A') + '</td>';
                        html += '<td>' + (official.designation || 'N/A') + '</td>';
                        html += '<td>' + (official.initial || 'N/A') + '</td>';
                        html += '<td>';
                        if (official.signature) {
                            html += `<img src="${official.signature}" class="official-signature-img">`;
                        } else { html += 'No signature'; }
                        html += '</td>';
                        html += '</tr>';
                    });
                    
                    html += '</table>';
                }
                
                const granting = second.grantingAuthority || {};
                html += '<div class="granting-section">';
                html += '<div class="granting-title">GRANTING AUTHORITY</div>';
                html += '<div class="granting-name">' + (granting.name || 'N/A') + '</div>';
                html += '<div class="granting-signature-display">';
                if (granting.signature) {
                    html += `<img src="${granting.signature}">`;
                } else { html += 'No signature'; }
                html += '</div>';
                
                if (granting.date) {
                    html += '<div style="margin-top: 20px;">';
                    html += '<span style="font-weight: 600;">Date: </span>';
                    html += '<span class="date-display">' + granting.date + '</span>';
                    html += '</div>';
                }
                html += '</div>';
                
                html += '<div style="text-align: center; color: #666; margin-top: 20px;">Internet Edition (7/2000)</div>';
                html += '</div></div>'; 
                
                if (formData.timestamp) {
                    html += '<div style="text-align: center; color: #888; margin: 20px;">';
                    html += '📅 ' + new Date(formData.timestamp).toLocaleString();
                    html += '</div>';
                }
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Error loading from Firebase:', error);
                container.innerHTML = '<div class="error-message">❌ Error loading data from cloud</div>';
            }
        }
    </script>
</body>
</html>
