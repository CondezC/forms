<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SSS Form Summary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .summary-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Form Cards */
        .form-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,60,143,0.15);
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }

        .card-header {
            background: linear-gradient(135deg, #003c8f, #1a4fa2);
            color: white;
            padding: 15px 25px;
            font-size: 1.3rem;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 3px solid #ffd700;
        }

        .card-body {
            padding: 25px;
        }

        /* Header with Logo */
        .header-with-logo {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .header-text h1 {
            font-size: 1.8rem;
            color: #003c8f;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .header-text .branch {
            color: #1976d2;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .header-text .address {
            color: #666;
            font-size: 0.9rem;
        }

        .logo-right {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-right img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Republic Header */
        .republic-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .republic-text h2 {
            font-size: 1.8rem;
            color: #003c8f;
            text-transform: uppercase;
        }

        .republic-text h3 {
            font-size: 1.4rem;
            color: #1976d2;
            margin: 5px 0;
        }

        .republic-text .form-number {
            color: #666;
            font-size: 0.9rem;
            font-style: italic;
        }

        /* SIMPLE LAYOUT - NO OVERLAP */
        .photo-section {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .photo-container {
            text-align: center;
        }

        .photo-label {
            font-size: 0.85rem;
            color: #003c8f;
            font-weight: 600;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .photo-frame {
            width: 130px;
            height: 130px;
            border: 3px solid #003c8f;
            border-radius: 8px;
            overflow: hidden;
            background: #f0f0f0;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Info Tables */
        .info-table {
            width: 50%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 1rem;
        }

        .info-table td {
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
        }

        .info-table td:first-child {
            font-weight: 600;
            color: #003c8f;
            width: 180px;
            background: #f8f9ff;
        }

        /* Certification Text */
        .certification-text {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #1976d2;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .certification-text p {
            margin-bottom: 10px;
            text-align: justify;
        }

        .certification-text strong {
            color: #003c8f;
        }

        /* Signature Grid */
        .signature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        .signature-box {
            text-align: center;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }

        .signature-box h4 {
            color: #003c8f;
            margin-bottom: 15px;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .signature-img {
            max-width: 100%;
            max-height: 70px;
            margin: 10px 0;
            border: 1px dashed #003c8f;
            padding: 5px;
            background: white;
        }

        .signature-name {
            color: #003c8f;
            font-weight: 600;
            padding: 8px;
            background: white;
            border-radius: 5px;
            border: 1px solid #e0e0e0;
        }

        /* Officials Table */
        .officials-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .officials-table th {
            background: #003c8f;
            color: white;
            padding: 12px;
            text-transform: uppercase;
        }

        .officials-table td {
            border: 1px solid #e0e0e0;
            padding: 10px;
            text-align: center;
        }

        .official-signature-img {
            max-width: 100px;
            max-height: 45px;
        }

        /* Noted Section */
        .noted-section {
            margin-top: 25px;
            text-align: center;
            padding: 20px;
            background: #f0f7ff;
            border-radius: 8px;
        }

        .noted-line {
            width: 250px;
            height: 2px;
            background: #003c8f;
            margin: 12px auto;
        }

        .noted-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #003c8f;
        }

        .noted-title {
            color: #666;
            font-size: 1rem;
            font-style: italic;
        }

        /* Granting Section */
        .granting-section {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 8px;
            border: 1px solid #cfe3ff;
        }

        .granting-title {
            color: #003c8f;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* Verified Badge */
        .verified-badge {
            text-align: center;
            margin-bottom: 20px;
        }

        .verified-badge span {
            background: #4caf50;
            color: white;
            padding: 6px 25px;
            border-radius: 50px;
            display: inline-block;
            font-weight: 600;
        }

        /* Timestamp */
        .timestamp {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin: 15px 0;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        /* Print Button */
        .print-btn {
            background: linear-gradient(135deg, #003c8f, #1976d2);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px auto;
            display: block;
        }

        .print-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(25, 118, 210, 0.3);
        }

        /* Loading & Error */
        .loading, .error-message {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 15px;
            font-size: 1.2rem;
        }

        .loading {
            color: #1976d2;
        }

        .error-message {
            color: #f44336;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .signature-grid {
                grid-template-columns: 1fr;
            }
            
            .header-with-logo, .republic-header {
                flex-direction: column;
                text-align: center;
            }
            
            .logo-right {
                margin-top: 10px;
            }
            
            .photo-section {
                justify-content: center;
            }
        }

        /* Print */
        @media print {
            @page {
                size: landscape;
                margin: 0.5in;
            }

            .print-btn, .verified-badge, .timestamp {
                display: none !important;
            }

            .form-card {
                box-shadow: none;
                border: 1px solid #000;
                page-break-after: auto;
            }

            .card-header {
                background: #003c8f !important;
                color: white !important;
            }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="summary-container" id="summaryContainer">
        <div class="loading">Loading data from cloud...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfQTN7UTRcW9lBm-rhRqyAOcT5gFZDJIs",
            authDomain: "sss-qr-system-39b59.firebaseapp.com",
            projectId: "sss-qr-system-39b59",
            storageBucket: "sss-qr-system-39b59.firebasestorage.app",
            messagingSenderId: "81090026028",
            appId: "1:81090026028:web:91dfd833462e2d95434f89"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.onload = function() {
            displaySummary();
        };

        async function displaySummary() {
            const container = document.getElementById('summaryContainer');
            
            const urlParams = new URLSearchParams(window.location.search);
            const submissionId = urlParams.get('id');
            
            if (!submissionId) {
                container.innerHTML = '<div class="error-message">❌ No submission ID found</div>';
                return;
            }

            try {
                const docRef = db.collection('sss-submissions').doc(submissionId);
                const docSnap = await docRef.get();

                if (!docSnap.exists) {
                    container.innerHTML = '<div class="error-message">❌ Submission not found</div>';
                    return;
                }

                const formData = docSnap.data();
                
                let html = '';
                
                // Verified Badge
                html += '<div class="verified-badge"><span>✓ VERIFIED CLOUD DATA</span></div>';
                
                // ============ FIRST FORM ============
                html += '<div class="form-card">';
                html += '<div class="card-header">📋 COMPANY REPRESENTATIVE AUTHORIZATION CARD</div>';
                html += '<div class="card-body">';
                
                // Header
                html += '<div class="header-with-logo">';
                html += '<div class="header-text">';
                html += '<h1>Social Security System</h1>';
                html += '<div class="branch">EASTWOOD BRANCH</div>';
                html += '<div class="address">187 ABQ Building, E. Rodriguez Jr. Ave., Bagumbayan, QC</div>';
                html += '</div>';
                html += '<div class="logo-right">';
                html += '<img src="republic-of-the-philippines-social-security-system-logo-png_seeklogo.png" alt="SSS Logo" onerror="this.innerHTML=\'SSS\';">';
                html += '</div>';
                html += '</div>';
                
                const first = formData.firstForm || {};
                
                // Photo (simple lang, walang overlap)
                if (first.photo && first.photo !== '#') {
                    html += '<div class="photo-section">';
                    html += '<div class="photo-container">';
                    html += '<div class="photo-label">1x1 PHOTO</div>';
                    html += '<div class="photo-frame">';
                    html += `<img src="${first.photo}" alt="1x1 Photo">`;
                    html += '</div>';
                    html += '</div>';
                    html += '</div>';
                }
                
                // Company Info
                html += '<table class="info-table">';
                html += '<tr><td>EMPLOYER NAME:</td><td>' + (first.employerName || 'N/A') + '</td></tr>';
                html += '<tr><td>EMPLOYER ID NO.:</td><td>' + (first.employerId || 'N/A') + '</td></tr>';
                html += '<tr><td>ADDRESS:</td><td>' + (first.address || 'N/A') + '</td></tr>';
                html += '<tr><td>TELEPHONE NO.:</td><td>' + (first.telephone || 'N/A') + '</td></tr>';
                html += '<tr><td>CERTIFIED NAME:</td><td>' + (first.certName || 'N/A') + '</td></tr>';
                html += '<tr><td>SS NUMBER:</td><td>' + (first.ssNumber || 'N/A') + '</td></tr>';
                html += '</table>';
                
                // Certification Text
                html += '<div class="certification-text">';
                html += '<p>This is to certify that Mr./Ms. <strong>' + (first.certName || 'N/A') + '</strong> with SS # <strong>' + (first.ssNumber || 'N/A') + '</strong>, whose specimen signatures / initials appear below, is authorized to transact, verify and file Employer Data Change Request (R-8), Employer Registration Form (R-1), Employment Report (R-1A) and Member Data Change Request (E-4) of herein company\'s employees.</p>';
                html += '<p>This Certification shall be valid within one (1) year from the date of issuance unless otherwise revoked and the SSS Eastwood Branch duly notified.</p>';
                html += '</div>';
                
                // Signatures
                html += '<div class="signature-grid">';
                
                if (first.specimenSignature1) {
                    html += '<div class="signature-box">';
                    html += '<h4>SPECIMEN SIGNATURE</h4>';
                    html += `<img src="${first.specimenSignature1}" class="signature-img">`;
                    html += '<div class="signature-name">' + (first.specimenName1 || '') + '</div>';
                    html += '</div>';
                }
                
                if (first.employerSignature) {
                    html += '<div class="signature-box">';
                    html += '<h4>SIGNATURE OVER PRINTED NAME</h4>';
                    html += `<img src="${first.employerSignature}" class="signature-img">`;
                    html += '<div class="signature-name">' + (first.employerName2 || first.employerName || '') + '</div>';
                    html += '</div>';
                }
                
                html += '</div>';
                
                // Noted By
                html += '<div class="noted-section">';
                html += '<div class="noted-line"></div>';
                html += '<div class="noted-name">ELEANOR F. DEATO</div>';
                html += '<div class="noted-title">Branch Head</div>';
                html += '</div>';
                
                html += '</div></div>'; // Close first form
                
                // ============ SECOND FORM ============
                html += '<div class="form-card">';
                html += '<div class="card-header">📋 SPECIMEN SIGNATURE CARD</div>';
                html += '<div class="card-body">';
                
                // Republic Header
                html += '<div class="republic-header">';
                html += '<div class="republic-text">';
                html += '<h2>Republic of the Philippines</h2>';
                html += '<h3>SOCIAL SECURITY SYSTEM</h3>';
                html += '<div class="form-number">SSS Form L - 501 (07-94)</div>';
                html += '</div>';
                html += '<div class="logo-right">';
                html += '<img src="republic-of-the-philippines-social-security-system-logo-png_seeklogo.png" alt="SSS Logo" onerror="this.innerHTML=\'SSS\';">';
                html += '</div>';
                html += '</div>';
                
                const second = formData.secondForm || {};
                
                // Company Info
                html += '<table class="info-table">';
                html += '<tr><td>Registered Employer Name:</td><td>' + (second.registeredName || first.employerName || 'N/A') + '</td></tr>';
                html += '<tr><td>I.D. No.:</td><td>' + (second.idNumber || first.employerId || 'N/A') + '</td></tr>';
                html += '<tr><td>Address:</td><td>' + (second.companyAddress || first.address || 'N/A') + '</td></tr>';
                html += '<tr><td>Tel. No.:</td><td>' + (second.telNumber || first.telephone || 'N/A') + '</td></tr>';
                html += '</table>';
                
                // Officials
                if (second.officials && second.officials.length > 0) {
                    html += '<h3 style="color:#003c8f; margin:20px 0 10px;">Authorized Officials</h3>';
                    html += '<table class="officials-table">';
                    html += '<tr><th>Name</th><th>Designation</th><th>Initials</th><th>Signature</th></tr>';
                    
                    second.officials.forEach(official => {
                        html += '<tr>';
                        html += '<td>' + (official.name || '') + '</td>';
                        html += '<td>' + (official.designation || '') + '</td>';
                        html += '<td>' + (official.initial || '') + '</td>';
                        html += '<td>' + (official.signature ? `<img src="${official.signature}" class="official-signature-img">` : 'No signature') + '</td>';
                        html += '</tr>';
                    });
                    
                    html += '</table>';
                }
                
                // Granting Authority
                const granting = second.grantingAuthority || {};
                if (granting.name || granting.signature) {
                    html += '<div class="granting-section">';
                    html += '<div class="granting-title">GRANTING AUTHORITY</div>';
                    html += '<p><strong>' + (granting.name || 'N/A') + '</strong></p>';
                    if (granting.signature) html += `<img src="${granting.signature}" class="signature-img">`;
                    if (granting.date) html += '<p><strong>Date:</strong> ' + granting.date + '</p>';
                    html += '</div>';
                }
                
                html += '</div></div>'; // Close second form
                
                // Timestamp
                if (formData.timestamp) {
                    html += '<div class="timestamp">📅 Generated: ' + new Date(formData.timestamp).toLocaleString() + '</div>';
                }
                
                // Print Button
                html += '<button class="print-btn" onclick="window.print()">🖨️ PRINT BOTH FORMS</button>';
                
                container.innerHTML = html;
                
            } catch (error) {
                container.innerHTML = '<div class="error-message">❌ Error: ' + error.message + '</div>';
            }
        }
    </script>
</body>
</html>
